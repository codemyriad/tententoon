<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Droste App — Wireframes</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&family=Kalam:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #1a1814;
    --paper: #f5f1ea;
    --muted: #8a8378;
    --line: #2a261f;
    --accent: #d94f2c;
    --accent-soft: rgba(217, 79, 44, 0.12);
    --font-display: 'Caveat', cursive;
    --font-body: 'Patrick Hand', cursive;
    --font-mono: 'Kalam', cursive;
  }
  html, body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); }
  body.neat {
    --font-display: 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'Inter', sans-serif;
  }
  body.neat .wf { letter-spacing: -0.005em; }
  /* Wireframe primitives */
  .wf { font-family: var(--font-body); color: var(--ink); }
  .wf h1, .wf h2, .wf h3, .wf .display { font-family: var(--font-display); font-weight: 700; letter-spacing: 0.01em; }
  .wf .mono { font-family: var(--font-mono); }
  .box {
    border: 1.5px solid var(--line);
    background: #fff;
    border-radius: 6px;
  }
  .box-d { border-style: dashed; }
  .box-soft { background: #faf7f1; }
  .placeholder {
    background:
      repeating-linear-gradient(45deg, transparent 0 10px, rgba(0,0,0,0.04) 10px 11px);
    border: 1.5px dashed var(--line);
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    border-radius: 4px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border: 1.5px solid var(--line); border-radius: 999px;
    background: #fff; font-size: 14px;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 8px 14px; border: 1.5px solid var(--line); border-radius: 6px;
    background: #fff; cursor: pointer; font-family: var(--font-body); font-size: 16px;
  }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.ghost { background: transparent; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border: 1.5px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px;
  }
  .annot { color: var(--accent); font-family: var(--font-display); font-size: 18px; }
  .annot-line { stroke: var(--accent); stroke-width: 1.5; fill: none; }
  body.no-annot .annotation { display: none !important; }
  /* sketchy slight rotations */
  .tilt-1 { transform: rotate(-0.4deg); }
  .tilt-2 { transform: rotate(0.5deg); }
  .tilt-3 { transform: rotate(-0.2deg); }
  /* Frame chrome */
  .frame {
    width: 100%; height: 100%;
    background: var(--paper);
    overflow: hidden;
    position: relative;
  }
  .frame.desk { background: #ecead

5; }
  .frame.desk { background: #ecead5; }
  .frame.mob { background: #ecead5; }
  .vp {
    position: absolute; inset: 16px;
    background: #fff;
    border: 1.5px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
  }
  .frame.mob .vp { border-radius: 26px; inset: 12px; }
  /* Top bars / chrome */
  .chrome {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; border-bottom: 1.5px solid var(--line);
    background: #faf7f1; font-size: 14px;
  }
  .dots { display: inline-flex; gap: 4px; }
  .dots i { width: 9px; height: 9px; border-radius: 50%; background: #fff; border: 1.5px solid var(--line); display: inline-block; }
  /* Droste preview placeholder — actual nested rectangles drawn via SVG inline */
  .droste-svg { display: block; width: 100%; height: 100%; }

  /* Section header styling for canvas */
  .approach-tag {
    display: inline-flex; gap: 8px; align-items: baseline;
    padding: 6px 12px; background: var(--accent); color: #fff;
    border-radius: 4px; transform: rotate(-1deg);
    font-family: var(--font-display); font-size: 26px;
  }
  .body-canvas-pad { padding: 40px 60px 80px; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../design-canvas.jsx"></script>
<script type="text/babel" src="../tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="approach-a.jsx"></script>
<script type="text/babel" src="approach-b.jsx"></script>
<script type="text/babel" src="approach-c.jsx"></script>
<script type="text/babel" src="approach-d.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
